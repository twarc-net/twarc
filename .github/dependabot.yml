version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      next:
        patterns:
          - "next"
          - "eslint-config-next"
          - "react"
          - "react-dom"
          - "@types/react*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      tiptap:
        patterns:
          - "@tiptap/*"
      dev-deps:
        dependency-type: development
        update-types: ["minor", "patch"]

  - package-ecosystem: composer
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      laravel:
        patterns:
          - "laravel/*"
      dev-deps:
        dependency-type: development
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly

  - package-ecosystem: docker
    directory: /infra/docker
    schedule:
      interval: monthly
