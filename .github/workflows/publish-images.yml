name: Publish images

# Builds twarc-api and twarc-web for linux/amd64 + linux/arm64 and pushes
# them to the GitHub Container Registry.
#
# Triggers:
#   - tag push v*.*.* → :v1.2.3, :v1.2, :latest
#   - push to main    → :main, :main-<short-sha>
#   - manual          → workflow_dispatch (useful when re-issuing for an
#                       existing tag without a code change)

on:
  push:
    tags: ["v*.*.*"]
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "docker/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/publish-images.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Override tag (default uses semver from ref)"
        required: false

permissions:
  contents: read       # checkout
  packages: write      # push to ghcr.io
  attestations: write  # build provenance
  id-token: write      # OIDC for sigstore-backed attestation

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false   # don't kill a release-tag publish

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: twarc-api
            dockerfile: docker/Dockerfile.api
            context: .
          - image: twarc-web
            dockerfile: docker/Dockerfile.web
            context: .

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=main-,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.description=twarc — The World of Anime, Rated & Curated
            org.opencontainers.image.url=https://twarc.net
            org.opencontainers.image.source=https://github.com/twarc-net/twarc
            org.opencontainers.image.documentation=https://github.com/twarc-net/twarc/blob/main/docs/runbooks/docker-deploy.md
            org.opencontainers.image.licenses=AGPL-3.0-only
            org.opencontainers.image.vendor=twarc

      - name: Build + push (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: true
          sbom: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
