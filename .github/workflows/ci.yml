name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      # pnpm/action-setup picks the version from package.json's `packageManager` field.
      # Don't pass `version:` here — it'd collide with `packageManager: pnpm@11.3.0`.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace deps
        working-directory: .
        # dangerouslyAllowAllBuilds: pnpm 10+ refuses postinstall scripts by
        # default; sharp + unrs-resolver need theirs to fetch native binaries.
        run: pnpm install --frozen-lockfile --config.dangerouslyAllowAllBuilds=true

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          INTERNAL_API_URL: http://127.0.0.1:8000
        run: pnpm build

  api:
    name: API (Laravel)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        # 8.4 — composer.lock has symfony 8.x + laravel/framework 13.11
        # resolved, both of which require php >=8.4.
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, pdo_pgsql, redis, gd, bcmath, zip, curl, xml
          coverage: none
          tools: composer:v2

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('apps/api/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Lint (Pint, dry run)
        run: vendor/bin/pint --test

      - name: Tests (PHPUnit)
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          SCOUT_DRIVER: 'null'
        run: vendor/bin/phpunit
